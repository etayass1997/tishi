<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="טישי">
<title>טישי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #252525;
    --accent: #c8a96e;
    --accent-dim: #9a7d48;
    --text: #e8e8e0;
    --text-dim: #777;
    --text-muted: #444;
    --user-bubble: #1e1e1e;
    --tishi-bubble: #131313;
    --radius: 18px;
    --font: 'Heebo', sans-serif;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
 
  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    direction: rtl;
  }
 
  /* ── SCREENS ── */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity .35s ease, transform .35s ease; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
 
  /* ── LOGIN ── */
  #login {
    align-items: center; justify-content: center; gap: 48px;
    background: radial-gradient(ellipse at 50% 30%, #1a1508 0%, var(--bg) 70%);
  }
 
  .logo-block { text-align: center; }
  .logo-name {
    font-size: 72px; font-weight: 700; letter-spacing: -2px;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(200,169,110,.25);
    line-height: 1;
  }
  .logo-sub { font-size: 13px; color: var(--text-dim); letter-spacing: 3px; margin-top: 8px; font-weight: 300; }
 
  .login-form { width: 100%; max-width: 320px; padding: 0 24px; display: flex; flex-direction: column; gap: 14px; }
 
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; padding: 16px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text); font-family: var(--font); font-size: 16px;
    outline: none; transition: border-color .2s;
    direction: rtl;
  }
  .input-wrap input:focus { border-color: var(--accent-dim); }
  .input-wrap input::placeholder { color: var(--text-muted); }
 
  .btn-enter {
    width: 100%; padding: 16px;
    background: var(--accent); border: none; border-radius: 14px;
    color: #0d0d0d; font-family: var(--font); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
    letter-spacing: .5px;
  }
  .btn-enter:active { transform: scale(.98); opacity: .85; }
 
  /* ── CHAT ── */
  #chat { background: var(--bg); }
 
  .chat-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #2a1f0a, #5a4020);
    border: 1.5px solid var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--accent);
    flex-shrink: 0;
  }
  .header-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .header-status { font-size: 11px; color: var(--accent-dim); margin-top: 1px; }
  .header-user { font-size: 13px; color: var(--text-dim); }
 
  .messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 0; }
 
  .msg { display: flex; flex-direction: column; max-width: 82%; animation: fadeUp .25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
 
  .msg.user { align-self: flex-start; }
  .msg.tishi { align-self: flex-end; }
 
  .bubble {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bubble); border: 1px solid var(--border);
    border-bottom-right-radius: 5px;
    color: var(--text);
  }
  .msg.tishi .bubble {
    background: linear-gradient(135deg, #1a1508, #131310);
    border: 1px solid #2a2010;
    border-bottom-left-radius: 5px;
    color: var(--text);
  }
  .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }
  .msg.tishi .msg-time { text-align: left; }
 
  .typing-indicator { display: flex; gap: 5px; padding: 14px 18px; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent-dim);
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
 
  /* ── INPUT BAR ── */
  .input-bar {
    padding: 12px 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex; align-items: flex-end; gap: 10px;
    flex-shrink: 0;
  }
 
  .input-main { flex: 1; position: relative; }
  textarea {
    width: 100%; min-height: 46px; max-height: 120px;
    padding: 12px 46px 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; color: var(--text); font-family: var(--font); font-size: 15px;
    resize: none; outline: none; line-height: 1.5; overflow-y: auto;
    transition: border-color .2s;
    direction: rtl;
  }
  textarea:focus { border-color: var(--border); }
  textarea::placeholder { color: var(--text-muted); }
 
  .attach-btn {
    position: absolute; left: 12px; bottom: 10px;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; transition: color .2s;
    padding: 2px;
  }
  .attach-btn:hover { color: var(--accent-dim); }
 
  .send-btn, .mic-btn {
    width: 46px; height: 46px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform .1s, opacity .2s;
    font-size: 18px;
  }
  .send-btn:active, .mic-btn:active { transform: scale(.9); }
 
  .send-btn {
    background: var(--accent); color: #0d0d0d;
  }
  .send-btn:disabled { opacity: .35; cursor: default; }
 
  .mic-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  }
  .mic-btn.recording {
    background: #3d0a0a; border-color: #8b1a1a; color: #ff6b6b;
    animation: pulse-red 1.2s infinite;
  }
  @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.3); } 50% { box-shadow: 0 0 0 8px rgba(255,107,107,0); } }
 
  /* ── IMAGE PREVIEW ── */
  .preview-bar {
    padding: 10px 14px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .preview-thumb {
    position: relative; width: 60px; height: 60px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb .remove-img {
    position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,.75); border: none; color: #fff;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .file-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 12px; color: var(--text-dim); position: relative;
  }
  .file-chip .remove-img { position: static; background: none; color: var(--text-muted); font-size: 13px; }
 
  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    padding: 40px;
  }
  .empty-name { font-size: 32px; font-weight: 700; color: var(--accent); opacity: .6; }
  .empty-hint { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.7; }
 
  #file-input { display: none; }
 
  /* ── FILE DOWNLOAD ── */
  .file-download {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; margin-top: 8px;
    background: linear-gradient(135deg, #1a1508, #131310);
    border: 1px solid var(--accent-dim); border-radius: 12px;
    color: var(--accent); font-family: var(--font); font-size: 14px;
    cursor: pointer; transition: opacity .2s;
    text-decoration: none;
  }
  .file-download:hover { opacity: .8; }
  .file-icon { font-size: 20px; }
 
  /* ── MESSAGE ACTIONS ── */
  .msg-actions {
    display: flex; gap: 6px; margin-top: 4px;
    opacity: 0; transition: opacity .2s;
  }
  .msg:hover .msg-actions { opacity: 1; }
  .msg-action-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 3px 8px;
    font-size: 11px; color: var(--text-muted);
    cursor: pointer; transition: color .2s, border-color .2s;
  }
  .msg-action-btn:hover { color: var(--accent); border-color: var(--accent-dim); }
 
  /* ── SETTINGS SCREEN ── */
  #settings {
    background: var(--bg);
    padding: 0;
  }
  .settings-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .back-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .settings-title { font-size: 17px; font-weight: 700; }
  .settings-body { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 28px; }
  .settings-section { display: flex; flex-direction: column; gap: 10px; }
  .settings-label { font-size: 12px; color: var(--accent-dim); letter-spacing: 1px; font-weight: 500; }
  .settings-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .model-options { display: flex; flex-direction: column; gap: 8px; }
  .model-option {
    padding: 14px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: border-color .2s, background .2s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .model-option.active { border-color: var(--accent); background: rgba(200,169,110,.06); }
  .model-option-name { font-size: 15px; font-weight: 500; }
  .model-option-tag { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .model-option-check { color: var(--accent); font-size: 18px; opacity: 0; }
  .model-option.active .model-option-check { opacity: 1; }
  .api-key-input {
    width: 100%; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; direction: ltr; text-align: left;
    transition: border-color .2s;
  }
  .api-key-input:focus { border-color: var(--accent-dim); }
  .api-key-input::placeholder { color: var(--text-muted); direction: rtl; text-align: right; }
  .btn-save {
    padding: 14px; border-radius: 12px;
    background: var(--accent); border: none;
    color: #0d0d0d; font-family: var(--font); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-save:active { opacity: .8; }
  .danger-zone { display: flex; flex-direction: column; gap: 8px; }
  .btn-danger {
    padding: 12px 16px; border-radius: 12px;
    background: none; border: 1px solid #3d1515;
    color: #c0504d; font-family: var(--font); font-size: 14px;
    cursor: pointer; text-align: right; transition: background .2s;
  }
  .btn-danger:active { background: #2a0a0a; }
 
  /* scrollbar for desktop */
  @media (min-width: 600px) {
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  }
</style>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<link rel="apple-touch-icon" href="icon.png">
</head>
<body>
 
<!-- LOGIN -->
<div id="login" class="screen">
  <div class="logo-block">
    <div class="logo-name">טישי</div>
    <div class="logo-sub">הסוכן האישי שלך</div>
  </div>
  <div class="login-form">
    <div class="input-wrap">
      <input type="text" id="name-input" placeholder="מה השם שלך?" autocomplete="off" maxlength="30">
    </div>
    <button class="btn-enter" onclick="enterChat()">כניסה</button>
  </div>
</div>
 
<!-- CHAT -->
<div id="chat" class="screen hidden">
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">ט</div>
      <div>
        <div class="header-name">טישי</div>
        <div class="header-status">מוכן</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-user" id="header-username"></div>
      <button onclick="openSettings()" title="הגדרות" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px;">⚙️</button>
    </div>
  </div>
 
  <div id="messages" class="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-name">שלום 👋</div>
      <div class="empty-hint">אני כאן. תוכל לשאול, לספר, להראות תמונה<br>או פשוט לדבר.</div>
    </div>
  </div>
 
  <div id="preview-bar" class="preview-bar"></div>
 
  <div class="input-bar">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="הקלטה קולית">🎙️</button>
    <div class="input-main">
      <textarea id="msg-input" placeholder="כתוב משהו..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="צרף קובץ או תמונה">📎</button>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <input type="file" id="file-input" accept="image/*,.pdf,.txt,.docx,.xlsx" multiple onchange="handleFiles(event)">
</div>
 
<!-- SETTINGS -->
<div id="settings" class="screen hidden">
  <div class="settings-header">
    <button class="back-btn" onclick="closeSettings()">←</button>
    <div class="settings-title">הגדרות</div>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-label">מודל AI</div>
      <div class="model-options">
        <div class="model-option active" id="opt-gemini" onclick="selectModel('gemini')">
          <div>
            <div class="model-option-name">Gemini Flash</div>
            <div class="model-option-tag">חינמי • מהיר • ברירת מחדל</div>
          </div>
          <div class="model-option-check">✓</div>
        </div>
        <div class="model-option" id="opt-claude" onclick="selectModel('claude')">
          <div>
            <div class="model-option-name">Claude Sonnet</div>
            <div class="model-option-tag">בתשלום • הכי חכם</div>
          </div>
          <div class="model-option-check">✓</div>
        </div>
      </div>
    </div>
 
    <div class="settings-section">
      <div class="settings-desc" style="color:var(--accent-dim);font-size:13px;">המפתחות מנוהלים בשרת — אין צורך להכניס כלום.</div>
    </div>
 
    <button class="btn-save" onclick="saveSettings()">שמור</button>
 
    <div class="settings-section">
      <div class="settings-label">ניהול נתונים</div>
      <div class="danger-zone">
        <button class="btn-danger" onclick="clearMyChat()">🗑️ מחק את השיחה שלי</button>
        <button class="btn-danger" onclick="clearAllData()">⚠️ מחק את כל הנתונים (כל המשתמשים)</button>
      </div>
    </div>
  </div>
</div>
 
<script>
const SYSTEM_PROMPT = `אתה טישי — סוכן אישי חכם, ישיר ורציני.
אתה מדבר עברית בלבד.
האישיות שלך: ישיר, מקשיב, חכם, רציני — אבל לא קר. אתה נוכח, תשומת לבך מלאה.
אתה זוכר כל מה שנאמר בשיחה הנוכחית.
אתה עונה בתמציתיות — לא מיותר, לא קצר מדי. רק מה שנחוץ.
כשמישהו מראה לך תמונה או קובץ — אתה מתייחס אליו ישירות.
כשמבקשים ממך ליצור קובץ — השתמש בפורמט הבא בדיוק:
[FILE:שם_קובץ.סיומת]
תוכן הקובץ כאן
[/FILE]
סיומות נתמכות: .txt .md .csv .html .json .docx .pdf
לקובץ docx או pdf — כתוב תוכן מובנה עם שורות כותרת שמתחילות ב-# ורשימות עם -
אל תציג את עצמך ואל תסביר מה אתה. פשוט היה נוכח.`;
 
let userName = '';
let history = [];
let summary = ''; // סיכום השיחה הישנה
let attachments = [];
let mediaRecorder = null;
let isRecording = false;
let recognition = null;
let currentModel = 'claude';
const MAX_RECENT = 10; // הודעות אחרונות לשלוח
const SUMMARIZE_EVERY = 20; // לסכם כל X הודעות
 
// ── STORAGE ──
const STORAGE_PREFIX = 'tishi_';
 
function storageKey(user, type) {
  return STORAGE_PREFIX + user.toLowerCase() + '_' + type;
}
 
function saveHistory(user, hist) {
  const toSave = hist.map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content :
      m.content.filter(b => b.type === 'text').map(b => b.text).join(' ')
  })).filter(m => m.content);
  try {
    localStorage.setItem(storageKey(user, 'history'), JSON.stringify(toSave.slice(-60)));
  } catch(e) {}
}
 
function loadHistory(user) {
  try {
    const raw = localStorage.getItem(storageKey(user, 'history'));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
 
function saveSummary(user, s) {
  try { localStorage.setItem(storageKey(user, 'summary'), s); } catch(e) {}
}
 
function loadSummary(user) {
  try { return localStorage.getItem(storageKey(user, 'summary')) || ''; } catch(e) { return ''; }
}
 
// בניית ההודעות לשליחה לשרת — רק אחרונות + סיכום
function buildMessagesForServer() {
  const recent = history.slice(-MAX_RECENT);
  if (!summary) return recent;
  // הוספת הסיכום כהודעת מערכת בתחילה
  return [
    { role: 'user', content: `[סיכום שיחה קודמת: ${summary}]` },
    { role: 'assistant', content: 'מובן, אני זוכר.' },
    ...recent
  ];
}
 
// יצירת סיכום כל SUMMARIZE_EVERY הודעות
async function maybeSummarize() {
  if (history.length < SUMMARIZE_EVERY || history.length % SUMMARIZE_EVERY !== 0) return;
  const toSummarize = history.slice(0, -MAX_RECENT);
  if (toSummarize.length === 0) return;
 
  try {
    const res = await fetch(SERVER_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          ...toSummarize,
          { role: 'user', content: 'סכם בקצרה את השיחה שלנו עד כה — נקודות עיקריות בלבד, 3-4 משפטים.' }
        ],
        username: userName,
        model: currentModel || 'claude'
      })
    });
    const data = await res.json();
    if (data.reply) {
      summary = (summary ? summary + ' | ' : '') + data.reply;
      saveSummary(userName, summary);
    }
  } catch(e) {}
}
 
function getAllUsers() {
  const users = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(STORAGE_PREFIX) && key.endsWith('_history')) {
      users.push(key.replace(STORAGE_PREFIX, '').replace('_history', ''));
    }
  }
  return users;
}
 
function deleteUserData(user) {
  localStorage.removeItem(storageKey(user, 'history'));
}
 
// ── AUTO LOGIN ──
window.addEventListener('load', () => {
  const saved = localStorage.getItem('tishi_username');
  if (saved) {
    document.getElementById('name-input').value = saved;
    enterChat();
  }
});
 
// ── LOGIN ──
function enterChat() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-input').focus(); return; }
  userName = val;
  localStorage.setItem('tishi_username', userName);
  document.getElementById('header-username').textContent = userName;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('chat').classList.remove('hidden');
 
  // טעינת הגדרות מודל
  const savedModel = localStorage.getItem('tishi_model') || 'claude';
  currentModel = savedModel;
 
  const saved = loadHistory(userName);
  const isReturning = saved.length > 0;
  history = saved;
  summary = loadSummary(userName);
 
  if (isReturning) {
    document.getElementById('empty-state').style.display = 'none';
    saved.forEach(m => {
      if (typeof m.content === 'string' && m.content)
        addMessage(m.role === 'user' ? 'user' : 'tishi', m.content);
    });
    setTimeout(() => addMessage('tishi', `ברוך שובך, ${userName}.`), 400);
  } else {
    setTimeout(() => addMessage('tishi', `שלום ${userName}.`), 400);
  }
}
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });
 
// ── TEXTAREA ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = el.value.trim() === '' && attachments.length === 0;
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
document.getElementById('msg-input').addEventListener('input', () => {
  document.getElementById('send-btn').disabled =
    document.getElementById('msg-input').value.trim() === '' && attachments.length === 0;
});
 
// ── FILES ──
function handleFiles(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const base64 = ev.target.result.split(',')[1];
      const isImage = file.type.startsWith('image/');
      attachments.push({ type: isImage ? 'image' : 'file', name: file.name, base64, mediaType: file.type });
      renderPreviews();
      document.getElementById('send-btn').disabled = false;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
 
function renderPreviews() {
  const bar = document.getElementById('preview-bar');
  bar.innerHTML = '';
  attachments.forEach((a, i) => {
    if (a.type === 'image') {
      bar.innerHTML += `<div class="preview-thumb"><img src="data:${a.mediaType};base64,${a.base64}"><button class="remove-img" onclick="removeAttachment(${i})">✕</button></div>`;
    } else {
      bar.innerHTML += `<div class="file-chip">📄 ${a.name}<button class="remove-img" onclick="removeAttachment(${i})">✕</button></div>`;
    }
  });
}
function removeAttachment(i) {
  attachments.splice(i, 1);
  renderPreviews();
  if (attachments.length === 0 && document.getElementById('msg-input').value.trim() === '')
    document.getElementById('send-btn').disabled = true;
}
 
// ── VOICE ──
function toggleMic() {
  if (isRecording) { stopRecording(); return; }
 
  // ננסה Web Speech API קודם (נוח יותר)
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'he-IL';
    recognition.interimResults = false;
    recognition.onresult = e => {
      const transcript = e.results[0][0].transcript;
      document.getElementById('msg-input').value += transcript;
      autoResize(document.getElementById('msg-input'));
    };
    recognition.onerror = () => stopRecording();
    recognition.onend = () => stopRecording();
    recognition.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹️';
  } else {
    alert('הדפדפן לא תומך בזיהוי קול. נסה Chrome.');
  }
}
function stopRecording() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').textContent = '🎙️';
}
 
// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && attachments.length === 0) return;
 
  // זיהוי פקודת מחיקה
  const deleteCommands = ['מחק שיחה', 'מחק הכל', 'התחל מחדש', 'נקה שיחה', 'reset'];
  if (deleteCommands.some(cmd => text.toLowerCase().includes(cmd.toLowerCase()))) {
    deleteUserData(userName);
    history = [];
    summary = '';
    document.getElementById('messages').innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-name">שיחה חדשה</div><div class="empty-hint">הכל נמחק.</div></div>';
    input.value = ''; input.style.height = 'auto';
    attachments = []; renderPreviews();
    setTimeout(() => addMessage('tishi', 'השיחה נמחקה. אפשר להתחיל מחדש.'), 300);
    return;
  }
 
  // הסתרת empty state
  document.getElementById('empty-state').style.display = 'none';
 
  // בניית תוכן הודעת משתמש
  let userContent;
  if (attachments.length > 0) {
    userContent = [];
    attachments.forEach(a => {
      if (a.type === 'image') {
        userContent.push({ type: 'image', source: { type: 'base64', media_type: a.mediaType, data: a.base64 } });
      } else {
        userContent.push({ type: 'text', text: `[קובץ מצורף: ${a.name}]` });
      }
    });
    if (text) userContent.push({ type: 'text', text });
    else userContent.push({ type: 'text', text: 'מה אתה רואה?' });
  } else {
    userContent = text;
  }
 
  // הצגה
  const displayText = text || (attachments.length > 0 ? attachments.map(a => `📎 ${a.name}`).join(' ') : '');
  addMessage('user', displayText, attachments.filter(a => a.type === 'image').map(a => `data:${a.mediaType};base64,${a.base64}`));
 
  // שמירה בהיסטוריה
  history.push({ role: 'user', content: userContent });
 
  // ניקוי
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  attachments = []; renderPreviews();
 
  // typing
  const typingId = showTyping();
 
  try {
    let reply;
 
    if (currentModel === 'gemini') {
      reply = await callGemini(history, userName);
    } else {
      reply = await callClaude(history, userName);
    }
 
    removeTyping(typingId);
    history.push({ role: 'assistant', content: reply });
    addMessage('tishi', reply);
    saveHistory(userName, history);
    maybeSummarize();
 
  } catch(err) {
    removeTyping(typingId);
    addMessage('tishi', 'לא הצלחתי להתחבר. בדוק חיבור לאינטרנט ומפתח API בהגדרות.');
  }
}
 
// ── TTS ──
function speakText(text, btn = null) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
 
  // המתנה קצרה לפני דיבור (פתרון לבאג Chrome/Android)
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'he-IL';
    utt.rate = 1.0;
    utt.pitch = 1.0;
    utt.volume = 1.0;
 
    // בחירת קול עברי אם קיים
    const voices = window.speechSynthesis.getVoices();
    const heVoice = voices.find(v => v.lang === 'he-IL' || v.lang === 'he');
    if (heVoice) utt.voice = heVoice;
 
    if (btn) {
      btn.textContent = '⏹ עצור';
      utt.onend = () => { btn.textContent = '🔊 האזן'; };
      utt.onerror = () => { btn.textContent = '🔊 האזן'; };
    }
 
    // פתרון לבאג Android שעוצר באמצע
    const resumeInterval = setInterval(() => {
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      if (!window.speechSynthesis.speaking) clearInterval(resumeInterval);
    }, 5000);
 
    utt.onend = () => {
      clearInterval(resumeInterval);
      if (btn) btn.textContent = '🔊 האזן';
    };
 
    window.speechSynthesis.speak(utt);
  }, 100);
}
 
// טעינת קולות בהתחלה
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
 
// ── UI HELPERS ──
function addMessage(role, text, images = []) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
 
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
 
  if (images.length > 0) {
    images.forEach(src => {
      const img = document.createElement('img');
      img.src = src; img.style.cssText = 'max-width:100%;border-radius:10px;margin-bottom:6px;display:block;';
      bubble.appendChild(img);
    });
  }
  if (text) {
    if (role === 'tishi') {
      const files = parseFileBlocks(text);
      const cleanedText = cleanText(text);
      if (cleanedText) {
        const t = document.createElement('span');
        t.textContent = cleanedText;
        bubble.appendChild(t);
      }
      files.forEach(async file => {
        const btn = await createDownloadBtn(file);
        bubble.appendChild(btn);
      });
    } else {
      const t = document.createElement('span');
      t.textContent = text;
      bubble.appendChild(t);
    }
  }
 
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
 
  // כפתורי פעולה
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
 
  // כפתור העתקה
  const copyBtn = document.createElement('button');
  copyBtn.className = 'msg-action-btn';
  copyBtn.textContent = 'העתק';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text || '').then(() => {
      copyBtn.textContent = '✓ הועתק';
      setTimeout(() => copyBtn.textContent = 'העתק', 2000);
    });
  };
  actions.appendChild(copyBtn);
 
  // כפתור האזנה (TTS) — רק להודעות טישי
  if (role === 'tishi' && text) {
    const ttsBtn = document.createElement('button');
    ttsBtn.className = 'msg-action-btn';
    ttsBtn.textContent = '🔊 האזן';
    ttsBtn.onclick = () => {
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        ttsBtn.textContent = '🔊 האזן';
      } else {
        speakText(text, ttsBtn);
      }
    };
    actions.appendChild(ttsBtn);
  }
 
  div.appendChild(bubble);
  div.appendChild(time);
  div.appendChild(actions);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
 
function showTyping() {
  const msgs = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg tishi'; div.id = id;
  div.innerHTML = '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) {
  document.getElementById(id)?.remove();
}
 
// ── FILE CREATION ──
function parseFileBlocks(text) {
  const regex = /\[FILE:(.*?)\]([\s\S]*?)\[\/FILE\]/g;
  const files = [];
  let match;
  while ((match = regex.exec(text)) !== null) {
    files.push({ name: match[1].trim(), content: match[2].trim() });
  }
  return files;
}
 
function cleanText(text) {
  return text.replace(/\[FILE:.*?\][\s\S]*?\[\/FILE\]/g, '').trim();
}
 
async function createDownloadBtn(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const wrap = document.createElement('div');
 
  const icons = { txt:'📄', md:'📝', csv:'📊', html:'🌐', json:'🔧', docx:'📘', pdf:'📕' };
  const icon = icons[ext] || '📄';
 
  if (ext === 'docx') {
    wrap.innerHTML = `<button class="file-download" onclick="downloadDocx(${JSON.stringify(file.name)}, ${JSON.stringify(file.content)})">${icon} הורד ${file.name}</button>`;
  } else if (ext === 'pdf') {
    wrap.innerHTML = `<button class="file-download" onclick="downloadPdfServer(${JSON.stringify(file.name)}, ${JSON.stringify(file.content)})">${icon} הורד ${file.name}</button>`;
  } else {
    const mimes = { txt:'text/plain;charset=utf-8', md:'text/markdown;charset=utf-8', csv:'text/csv;charset=utf-8', html:'text/html;charset=utf-8', json:'application/json;charset=utf-8' };
    const mime = mimes[ext] || 'text/plain;charset=utf-8';
    const blob = new Blob(['﻿' + file.content], { type: mime });
    const url = URL.createObjectURL(blob);
    wrap.innerHTML = `<a class="file-download" href="${url}" download="${file.name}">${icon} הורד ${file.name}</a>`;
  }
  return wrap;
}
 
function downloadDocx(filename, content) {
  try {
    const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;
    const lines = content.split('\n');
    const children = lines.map(line => {
      if (line.startsWith('# ')) return new Paragraph({ heading: HeadingLevel.HEADING_1, children: [new TextRun(line.slice(2))] });
      if (line.startsWith('## ')) return new Paragraph({ heading: HeadingLevel.HEADING_2, children: [new TextRun(line.slice(3))] });
      if (line.startsWith('- ')) return new Paragraph({ bullet: { level: 0 }, children: [new TextRun(line.slice(2))] });
      return new Paragraph({ children: [new TextRun(line)] });
    });
    const doc = new Document({ sections: [{ children }] });
    Packer.toBlob(doc).then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
    });
  } catch(e) { alert('שגיאה ביצירת Word: ' + e.message); }
}
 
function downloadPdf(filename, content) {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    // תמיכה בעברית
    doc.setFont('helvetica');
    doc.setFontSize(12);
    const lines = content.split('\n');
    let y = 20;
    lines.forEach(line => {
      if (y > 270) { doc.addPage(); y = 20; }
      if (line.startsWith('# ')) {
        doc.setFontSize(18); doc.setFont('helvetica', 'bold');
        doc.text(line.slice(2), 10, y);
        doc.setFontSize(12); doc.setFont('helvetica', 'normal');
      } else if (line.startsWith('## ')) {
        doc.setFontSize(14); doc.setFont('helvetica', 'bold');
        doc.text(line.slice(3), 10, y);
        doc.setFontSize(12); doc.setFont('helvetica', 'normal');
      } else {
        const wrapped = doc.splitTextToSize(line || ' ', 190);
        doc.text(wrapped, 10, y);
        y += (wrapped.length - 1) * 7;
      }
      y += 8;
    });
    doc.save(filename);
  } catch(e) { alert('שגיאה ביצירת PDF: ' + e.message); }
}
 
// ── SERVER URL ──
const SERVER_URL = 'https://tishi-server.onrender.com';
 
// ── GEMINI API (דרך השרת) ──
async function callGemini(hist, user) {
  const res = await fetch(`${SERVER_URL}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: hist, username: user, model: currentModel || 'claude' })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.reply;
}
 
// ── CLAUDE API (דרך השרת) ──
async function callClaude(hist, user) {
  const res = await fetch(`${SERVER_URL}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: hist, username: user, model: 'claude' })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.reply;
}
 
// ── SETTINGS ──
function openSettings() {
  // טעינת ערכים קיימים
  const savedModel = localStorage.getItem('tishi_model') || 'claude';
  selectModel(savedModel, false);
  const gk = localStorage.getItem('tishi_gemini_key') || '';
  const ck = localStorage.getItem('tishi_claude_key') || '';
  if (gk) document.getElementById('gemini-key-input').value = gk;
  if (ck) document.getElementById('claude-key-input').value = ck;
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('settings').classList.remove('hidden');
}
 
function closeSettings() {
  document.getElementById('settings').classList.add('hidden');
  document.getElementById('chat').classList.remove('hidden');
}
 
function selectModel(model, save = true) {
  currentModel = model;
  document.getElementById('opt-gemini').classList.toggle('active', model === 'gemini');
  document.getElementById('opt-claude').classList.toggle('active', model === 'claude');
  document.getElementById('gemini-key-section').classList.toggle('hidden', model !== 'gemini');
  document.getElementById('claude-key-section').classList.toggle('hidden', model !== 'claude');
  if (save) localStorage.setItem('tishi_model', model);
}
 
function saveSettings() {
  localStorage.setItem('tishi_model', currentModel);
  closeSettings();
  addMessage('tishi', `עברתי ל-${currentModel === 'gemini' ? 'Gemini' : 'Claude'} ✓`);
}
 
function clearMyChat() {
  if (!confirm('למחוק את השיחה שלך?')) return;
  deleteUserData(userName);
  history = [];
  summary = '';
  closeSettings();
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-name">שיחה חדשה</div><div class="empty-hint">הכל נמחק.</div></div>';
  setTimeout(() => addMessage('tishi', 'שיחה חדשה. במה אוכל לעזור?'), 300);
}
 
function clearAllData() {
  if (!confirm('למחוק את כל הנתונים של כל המשתמשים?')) return;
  getAllUsers().forEach(u => deleteUserData(u));
  localStorage.removeItem('tishi_model');
  closeSettings();
  addMessage('tishi', 'כל הנתונים נמחקו.');
}
 
// ── CLEAR CHAT ──
function clearChat() {
  if (!confirm('למחוק את כל השיחה?')) return;
  deleteUserData(userName);
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-name">שיחה חדשה</div><div class="empty-hint">הכל נמחק. אפשר להתחיל מחדש.</div></div>';
  setTimeout(() => addMessage('tishi', 'שיחה חדשה. במה אוכל לעזור?'), 300);
}
