<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="תישי">
<meta name="mobile-web-app-capable" content="yes">
<title>תישי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #252525;
    --accent: #c8a96e;
    --accent-dim: #9a7d48;
    --text: #e8e8e0;
    --text-dim: #777;
    --text-muted: #444;
    --user-bubble: #1e1e1e;
    --tishi-bubble: #131313;
    --radius: 18px;
    --font: 'Heebo', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    direction: rtl;
  }

  /* ── SCREENS ── */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity .35s ease, transform .35s ease; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ── LOGIN ── */
  #login {
    align-items: center; justify-content: center; gap: 48px;
    background: radial-gradient(ellipse at 50% 30%, #1a1508 0%, var(--bg) 70%);
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  .logo-block { text-align: center; }
  .logo-name {
    font-size: 72px; font-weight: 700; letter-spacing: -2px;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(200,169,110,.25);
    line-height: 1;
  }
  .logo-sub { font-size: 13px; color: var(--text-dim); letter-spacing: 3px; margin-top: 8px; font-weight: 300; }

  .login-form { width: 100%; max-width: 320px; padding: 0 24px; display: flex; flex-direction: column; gap: 14px; }

  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; padding: 16px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text); font-family: var(--font); font-size: 16px;
    outline: none; transition: border-color .2s;
    direction: rtl;
  }
  .input-wrap input:focus { border-color: var(--accent-dim); }
  .input-wrap input::placeholder { color: var(--text-muted); }

  .btn-enter {
    width: 100%; padding: 16px;
    background: var(--accent); border: none; border-radius: 14px;
    color: #0d0d0d; font-family: var(--font); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
    letter-spacing: .5px;
  }
  .btn-enter:active { transform: scale(.98); opacity: .85; }

  /* ── CHAT ── */
  #chat { background: var(--bg); }

  .chat-header {
    padding: calc(16px + var(--safe-top)) 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #2a1f0a, #5a4020);
    border: 1.5px solid var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--accent);
    flex-shrink: 0;
  }
  .header-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .header-status { font-size: 11px; color: var(--accent-dim); margin-top: 1px; }
  .header-user { font-size: 13px; color: var(--text-dim); }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 0; }

  .msg { display: flex; flex-direction: column; max-width: 82%; animation: fadeUp .25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { align-self: flex-start; }
  .msg.tishi { align-self: flex-end; }

  .bubble {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bubble); border: 1px solid var(--border);
    border-bottom-right-radius: 5px;
    color: var(--text);
  }
  .msg.tishi .bubble {
    background: linear-gradient(135deg, #1a1508, #131310);
    border: 1px solid #2a2010;
    border-bottom-left-radius: 5px;
    color: var(--text);
  }
  .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }
  .msg.tishi .msg-time { text-align: left; }

  .typing-indicator { display: flex; gap: 5px; padding: 14px 18px; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent-dim);
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 12px 14px calc(20px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex; align-items: flex-end; gap: 10px;
    flex-shrink: 0;
  }

  .input-main { flex: 1; position: relative; }
  textarea {
    width: 100%; min-height: 46px; max-height: 120px;
    padding: 12px 46px 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; color: var(--text); font-family: var(--font); font-size: 15px;
    resize: none; outline: none; line-height: 1.5; overflow-y: auto;
    transition: border-color .2s;
    direction: rtl;
  }
  textarea:focus { border-color: var(--border); }
  textarea::placeholder { color: var(--text-muted); }

  .attach-btn {
    position: absolute; left: 12px; bottom: 10px;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; transition: color .2s;
    padding: 2px;
  }
  .attach-btn:hover { color: var(--accent-dim); }

  .send-btn, .mic-btn {
    width: 46px; height: 46px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform .1s, opacity .2s;
    font-size: 18px;
  }
  .send-btn:active, .mic-btn:active { transform: scale(.9); }

  .send-btn {
    background: var(--accent); color: #0d0d0d;
  }
  .send-btn:disabled { opacity: .35; cursor: default; }

  .mic-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  }
  .mic-btn.recording {
    background: #3d0a0a; border-color: #8b1a1a; color: #ff6b6b;
    animation: pulse-red 1.2s infinite;
  }
  @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.3); } 50% { box-shadow: 0 0 0 8px rgba(255,107,107,0); } }

  /* ── IMAGE PREVIEW ── */
  .preview-bar {
    padding: 10px 14px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .preview-thumb {
    position: relative; width: 60px; height: 60px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb .remove-img {
    position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,.75); border: none; color: #fff;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .file-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 12px; color: var(--text-dim); position: relative;
  }
  .file-chip .remove-img { position: static; background: none; color: var(--text-muted); font-size: 13px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    padding: 40px;
  }
  .empty-name { font-size: 32px; font-weight: 700; color: var(--accent); opacity: .6; }
  .empty-hint { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.7; }

  #file-input { display: none; }

  /* ── SETTINGS SCREEN ── */
  #settings {
    background: var(--bg);
    padding: 0;
  }
  .settings-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .back-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .settings-title { font-size: 17px; font-weight: 700; }
  .settings-body { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 28px; }
  .settings-section { display: flex; flex-direction: column; gap: 10px; }
  .settings-label { font-size: 12px; color: var(--accent-dim); letter-spacing: 1px; font-weight: 500; }
  .settings-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .model-options { display: flex; flex-direction: column; gap: 8px; }
  .model-option {
    padding: 14px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: border-color .2s, background .2s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .model-option.active { border-color: var(--accent); background: rgba(200,169,110,.06); }
  .model-option-name { font-size: 15px; font-weight: 500; }
  .model-option-tag { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .model-option-check { color: var(--accent); font-size: 18px; opacity: 0; }
  .model-option.active .model-option-check { opacity: 1; }
  .api-key-input {
    width: 100%; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; direction: ltr; text-align: left;
    transition: border-color .2s;
  }
  .api-key-input:focus { border-color: var(--accent-dim); }
  .api-key-input::placeholder { color: var(--text-muted); direction: rtl; text-align: right; }
  .btn-save {
    padding: 14px; border-radius: 12px;
    background: var(--accent); border: none;
    color: #0d0d0d; font-family: var(--font); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-save:active { opacity: .8; }
  .danger-zone { display: flex; flex-direction: column; gap: 8px; }
  .btn-danger {
    padding: 12px 16px; border-radius: 12px;
    background: none; border: 1px solid #3d1515;
    color: #c0504d; font-family: var(--font); font-size: 14px;
    cursor: pointer; text-align: right; transition: background .2s;
  }
  .btn-danger:active { background: #2a0a0a; }

  /* ── MSG ACTIONS ── */
  .msg-actions {
    display: flex; gap: 2px; margin-top: 3px; padding: 0 4px;
    opacity: 0; transition: opacity .2s;
  }
  .msg:hover .msg-actions { opacity: 1; }
  @media (max-width: 600px) { .msg-actions { opacity: 0.5; } }
  .msg-actions button {
    background: none; border: none; cursor: pointer;
    font-size: 13px; padding: 3px 6px; border-radius: 6px;
    color: var(--text-muted); transition: background .15s, color .15s;
    line-height: 1;
  }
  .msg-actions button:hover { background: var(--surface); color: var(--text-dim); }

  /* scrollbar for desktop */
  @media (min-width: 600px) {
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  }
</style>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="logo-block">
    <div class="logo-name">תישי</div>
    <div class="logo-sub">הסוכן האישי שלך</div>
  </div>
  <div class="login-form">
    <div class="input-wrap">
      <input type="text" id="name-input" placeholder="מה השם שלך?" autocomplete="off" maxlength="30">
    </div>
    <button class="btn-enter" onclick="enterChat()">כניסה</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen hidden">
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">ת</div>
      <div>
        <div class="header-name">תישי</div>
        <div class="header-status">מוכן</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-user" id="header-username"></div>
      <button onclick="openSettings()" title="הגדרות" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px;">⚙️</button>
    </div>
  </div>

  <div id="messages" class="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-name">שלום 👋</div>
      <div class="empty-hint">אני כאן. תוכל לשאול, לספר, להראות תמונה<br>או פשוט לדבר.</div>
    </div>
  </div>

  <div id="preview-bar" class="preview-bar"></div>

  <div class="input-bar">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="הקלטה קולית">🎙️</button>
    <div class="input-main">
      <textarea id="msg-input" placeholder="כתוב משהו..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="צרף קובץ או תמונה">📎</button>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <input type="file" id="file-input" accept="image/*,audio/*,.pdf,.txt,.docx,.xlsx" multiple onchange="handleFiles(event)">
</div>

<!-- SETTINGS -->
<div id="settings" class="screen hidden">
  <div class="settings-header">
    <button class="back-btn" onclick="closeSettings()">←</button>
    <div class="settings-title">הגדרות</div>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-desc" style="color:var(--accent-dim);font-size:13px;">מופעל על Claude Sonnet — המפתח מנוהל בשרת.</div>
    </div>

    <div class="settings-section">
      <div class="settings-label">מה תישי זוכר עליך</div>
      <div id="facts-list" style="display:flex;flex-direction:column;gap:6px;"></div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <input type="text" id="new-fact-input" class="api-key-input" placeholder='לדוגמה: "אני עובד בחברת הייטק"' style="flex:1;" onkeydown="if(event.key==='Enter')addFactFromInput()">
        <button onclick="addFactFromInput()" style="padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);cursor:pointer;font-size:13px;white-space:nowrap;">+ הוסף</button>
      </div>
      <div class="settings-desc">תוכל גם לכתוב בצ'אט "זכור ש..." ותישי יזכור אוטומטית.</div>
    </div>

    <button class="btn-save" onclick="saveSettings()">שמור</button>

    <div class="settings-section">
      <div class="settings-label">ניהול נתונים</div>
      <div class="danger-zone">
        <button class="btn-danger" onclick="clearMyChat()">🗑️ מחק את השיחה שלי</button>
        <button class="btn-danger" onclick="clearAllData()">⚠️ מחק את כל הנתונים (כל המשתמשים)</button>
        <button class="btn-danger" onclick="changeUser()">👤 החלף שם משתמש</button>
      </div>
    </div>
  </div>
</div>

<script>
// System prompt managed server-side

let userName = '';
let history = [];
let attachments = [];
let mediaRecorder = null;
let isRecording = false;
let recognition = null;
const currentModel = 'claude';

// ── STORAGE ──
const STORAGE_PREFIX = 'tishi_';

function storageKey(user, type) {
  return STORAGE_PREFIX + user.toLowerCase() + '_' + type;
}

function saveHistory(user, hist) {
  const toSave = hist.map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content :
      m.content.filter(b => b.type === 'text').map(b => b.text).join(' ')
  })).filter(m => m.content);
  try {
    localStorage.setItem(storageKey(user, 'history'), JSON.stringify(toSave.slice(-60)));
  } catch(e) {}
}

function loadHistory(user) {
  try {
    const raw = localStorage.getItem(storageKey(user, 'history'));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function loadUserFacts(user) {
  try {
    const raw = localStorage.getItem(storageKey(user, 'facts'));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveUserFacts(user, facts) {
  try {
    localStorage.setItem(storageKey(user, 'facts'), JSON.stringify(facts));
  } catch(e) {}
}

function addUserFact(user, fact) {
  const facts = loadUserFacts(user);
  const clean = fact.trim();
  if (clean && !facts.includes(clean)) {
    facts.push(clean);
    saveUserFacts(user, facts);
  }
  return facts;
}

function removeUserFact(user, index) {
  const facts = loadUserFacts(user);
  facts.splice(index, 1);
  saveUserFacts(user, facts);
  return facts;
}

function extractFact(text) {
  const match = text.match(/^זכור ש[ְ-ּ]?(.+)/u);
  return match ? match[1].trim() : null;
}

function getAllUsers() {
  const users = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(STORAGE_PREFIX) && key.endsWith('_history')) {
      users.push(key.replace(STORAGE_PREFIX, '').replace('_history', ''));
    }
  }
  return users;
}

function deleteUserData(user) {
  localStorage.removeItem(storageKey(user, 'history'));
  localStorage.removeItem(storageKey(user, 'facts'));
}

// ── LOGIN ──
function enterChat() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-input').focus(); return; }
  userName = val;
  localStorage.setItem('tishi_username', userName);
  document.getElementById('header-username').textContent = userName;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('chat').classList.remove('hidden');

  const saved = loadHistory(userName);
  const isReturning = saved.length > 0;
  history = saved;

  if (isReturning) {
    document.getElementById('empty-state').style.display = 'none';
    saved.forEach(m => {
      if (typeof m.content === 'string' && m.content)
        addMessage(m.role === 'user' ? 'user' : 'tishi', m.content);
    });
    setTimeout(() => addMessage('tishi', `ברוך שובך, ${userName}.`), 400);
  } else {
    setTimeout(() => addMessage('tishi', `שלום ${userName}.`), 400);
  }
}
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });

// אם השם כבר שמור — כניסה אוטומטית
const _savedName = localStorage.getItem('tishi_username');
if (_savedName) {
  document.getElementById('name-input').value = _savedName;
  enterChat();
}

// ── TEXTAREA ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = el.value.trim() === '' && attachments.length === 0;
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
document.getElementById('msg-input').addEventListener('input', () => {
  document.getElementById('send-btn').disabled =
    document.getElementById('msg-input').value.trim() === '' && attachments.length === 0;
});

// ── FILES ──
async function extractPdfText(base64Data) {
  if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js לא נטען');
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const binary = atob(base64Data);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
  let text = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(' ') + '\n';
  }
  return text.trim();
}

function handleFiles(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();

    if (file.type.startsWith('image/')) {
      reader.onload = ev => {
        attachments.push({ type: 'image', name: file.name, base64: ev.target.result.split(',')[1], mediaType: file.type });
        renderPreviews();
        document.getElementById('send-btn').disabled = false;
      };
      reader.readAsDataURL(file);

    } else if (file.type.startsWith('audio/')) {
      reader.onload = ev => {
        attachments.push({ type: 'audio', name: file.name, base64: ev.target.result.split(',')[1], mediaType: file.type });
        renderPreviews();
        document.getElementById('send-btn').disabled = false;
      };
      reader.readAsDataURL(file);

    } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
      reader.onload = ev => {
        attachments.push({ type: 'text_file', name: file.name, content: ev.target.result });
        renderPreviews();
        document.getElementById('send-btn').disabled = false;
      };
      reader.readAsText(file, 'utf-8');

    } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
      reader.onload = async ev => {
        const base64 = ev.target.result.split(',')[1];
        try {
          const pdfText = await extractPdfText(base64);
          attachments.push({ type: 'text_file', name: file.name, content: pdfText });
        } catch(err) {
          attachments.push({ type: 'file', name: file.name, base64, mediaType: file.type });
        }
        renderPreviews();
        document.getElementById('send-btn').disabled = false;
      };
      reader.readAsDataURL(file);

    } else {
      reader.onload = ev => {
        attachments.push({ type: 'file', name: file.name, base64: ev.target.result.split(',')[1], mediaType: file.type });
        renderPreviews();
        document.getElementById('send-btn').disabled = false;
      };
      reader.readAsDataURL(file);
    }
  });
  e.target.value = '';
}

function renderPreviews() {
  const bar = document.getElementById('preview-bar');
  bar.innerHTML = '';
  attachments.forEach((a, i) => {
    if (a.type === 'image') {
      bar.innerHTML += `<div class="preview-thumb"><img src="data:${a.mediaType};base64,${a.base64}"><button class="remove-img" onclick="removeAttachment(${i})">✕</button></div>`;
    } else {
      bar.innerHTML += `<div class="file-chip">📄 ${a.name}<button class="remove-img" onclick="removeAttachment(${i})">✕</button></div>`;
    }
  });
}
function removeAttachment(i) {
  attachments.splice(i, 1);
  renderPreviews();
  if (attachments.length === 0 && document.getElementById('msg-input').value.trim() === '')
    document.getElementById('send-btn').disabled = true;
}

// ── VOICE ──
function toggleMic() {
  if (isRecording) { stopRecording(); return; }

  // ננסה Web Speech API קודם (נוח יותר)
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'he-IL';
    recognition.interimResults = false;
    recognition.onresult = e => {
      const transcript = e.results[0][0].transcript;
      document.getElementById('msg-input').value += transcript;
      autoResize(document.getElementById('msg-input'));
    };
    recognition.onerror = () => stopRecording();
    recognition.onend = () => stopRecording();
    recognition.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹️';
  } else {
    alert('הדפדפן לא תומך בזיהוי קול. נסה Chrome.');
  }
}
function stopRecording() {
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').textContent = '🎙️';
}

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && attachments.length === 0) return;

  // הסתרת empty state
  document.getElementById('empty-state').style.display = 'none';

  // בניית תוכן הודעת משתמש
  let userContent;
  if (attachments.length > 0) {
    userContent = [];
    attachments.forEach(a => {
      if (a.type === 'image') {
        userContent.push({ type: 'image', source: { type: 'base64', media_type: a.mediaType, data: a.base64 } });
      } else if (a.type === 'audio') {
        userContent.push({ type: 'audio', source: { type: 'base64', media_type: a.mediaType, data: a.base64 } });
      } else if (a.type === 'text_file') {
        userContent.push({ type: 'text', text: `[תוכן הקובץ "${a.name}":\n${a.content}]` });
      } else {
        userContent.push({ type: 'text', text: `[קובץ מצורף: ${a.name}]` });
      }
    });
    if (text) userContent.push({ type: 'text', text });
    else userContent.push({ type: 'text', text: 'מה אתה רואה?' });
  } else {
    userContent = text;
  }

  // זיהוי "זכור ש..."
  if (text) {
    const fact = extractFact(text);
    if (fact) addUserFact(userName, fact);
  }

  // הצגה
  const displayText = text || (attachments.length > 0 ? attachments.map(a => `📎 ${a.name}`).join(' ') : '');
  addMessage('user', displayText, attachments.filter(a => a.type === 'image').map(a => `data:${a.mediaType};base64,${a.base64}`));

  // שמירה בהיסטוריה
  history.push({ role: 'user', content: userContent });

  // ניקוי
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  attachments = []; renderPreviews();

  // typing
  const typingId = showTyping();

  try {
    let reply;

    reply = await callClaude(history, userName);

    removeTyping(typingId);
    history.push({ role: 'assistant', content: reply });
    addMessage('tishi', reply);
    saveHistory(userName, history);
    speakText(reply);

  } catch(err) {
    removeTyping(typingId);
    addMessage('tishi', `שגיאה: ${err.message || 'לא הצלחתי להתחבר לשרת. בדוק חיבור לאינטרנט.'}`);
  }
}

// ── TTS ──
let activeSpeakBtn = null;

function speakText(text, btn) {
  if (!('speechSynthesis' in window)) return;

  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    if (activeSpeakBtn) { activeSpeakBtn.textContent = '🔊'; activeSpeakBtn = null; }
    if (btn === activeSpeakBtn) return;
  }

  const utt = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  const heVoice = voices.find(v => v.lang && v.lang.startsWith('he'));
  if (heVoice) utt.voice = heVoice;
  utt.lang = 'he-IL';
  utt.rate = 1.05;

  if (btn) {
    activeSpeakBtn = btn;
    btn.textContent = '⏹️';
    utt.onend = () => { btn.textContent = '🔊'; activeSpeakBtn = null; };
    utt.onerror = () => { btn.textContent = '🔊'; activeSpeakBtn = null; };
  }

  window.speechSynthesis.speak(utt);
}

function speakBubble(btn) {
  const text = btn.closest('.msg').querySelector('.bubble').innerText || '';
  speakText(text, btn);
}

async function copyBubble(btn) {
  const text = btn.closest('.msg').querySelector('.bubble').innerText || '';
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = '📋', 1500);
}

function downloadBubble(btn) {
  const text = btn.closest('.msg').querySelector('.bubble').innerText || '';
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'תישי_' + new Date().toLocaleString('he-IL').replace(/[/:, ]/g, '_') + '.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function printBubble(btn) {
  const text = btn.closest('.msg').querySelector('.bubble').innerText || '';
  const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const html = `<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<title>תישי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Heebo', Arial, sans-serif; direction: rtl; padding: 48px; line-height: 1.9; color: #111; font-size: 15px; max-width: 700px; margin: 0 auto; white-space: pre-wrap; }
  @media print { body { padding: 24px; } }
</style>
</head>
<body>${safe}</body>
</html>`;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (win) {
    win.onload = () => { URL.revokeObjectURL(url); win.focus(); win.print(); };
  } else {
    // fallback אם popup חסום — הורד כ-HTML
    const a = document.createElement('a');
    a.href = url;
    a.download = 'תישי_' + new Date().toLocaleString('he-IL').replace(/[/:, ]/g, '_') + '.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  }
}

// ── UI HELPERS ──
function addMessage(role, text, images = []) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (images.length > 0) {
    images.forEach(src => {
      const img = document.createElement('img');
      img.src = src; img.style.cssText = 'max-width:100%;border-radius:10px;margin-bottom:6px;display:block;';
      bubble.appendChild(img);
    });
  }
  if (text) {
    const t = document.createElement('span');
    t.textContent = text;
    bubble.appendChild(t);
  }

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });

  div.appendChild(bubble);
  div.appendChild(time);

  if (role === 'tishi') {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML =
      `<button onclick="speakBubble(this)" title="הקרא">🔊</button>` +
      `<button onclick="copyBubble(this)" title="העתק">📋</button>` +
      `<button onclick="downloadBubble(this)" title="הורד כטקסט">💾</button>` +
      `<button onclick="printBubble(this)" title="הורד כ-PDF">📄</button>`;
    div.appendChild(actions);
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg tishi'; div.id = id;
  div.innerHTML = '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) {
  document.getElementById(id)?.remove();
}

// ── SERVER URL ──
const SERVER_URL = 'https://tishi-server.onrender.com';

// ── CLAUDE API (דרך השרת) ──
async function callClaude(hist, user) {
  const res = await fetch(`${SERVER_URL}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: hist, username: user, model: 'claude', user_facts: loadUserFacts(user) })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.reply;
}

// ── SETTINGS ──
function openSettings() {
  renderFactsList();
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('settings').classList.remove('hidden');
}

function renderFactsList() {
  const facts = loadUserFacts(userName);
  const list = document.getElementById('facts-list');
  if (!list) return;
  if (facts.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--text-muted);">אין זיכרונות עדיין.</div>';
    return;
  }
  list.innerHTML = facts.map((f, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">
      <span style="flex:1;font-size:13px;color:var(--text);">${f}</span>
      <button onclick="deleteFact(${i})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 4px;" title="מחק">✕</button>
    </div>`).join('');
}

function addFactFromInput() {
  const input = document.getElementById('new-fact-input');
  const val = input.value.trim();
  if (!val) return;
  addUserFact(userName, val);
  input.value = '';
  renderFactsList();
}

function deleteFact(index) {
  removeUserFact(userName, index);
  renderFactsList();
}

function closeSettings() {
  document.getElementById('settings').classList.add('hidden');
  document.getElementById('chat').classList.remove('hidden');
}


function saveSettings() {
  closeSettings();
}

function clearMyChat() {
  if (!confirm('למחוק את השיחה שלך?')) return;
  deleteUserData(userName);
  history = [];
  closeSettings();
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-name">שיחה חדשה</div><div class="empty-hint">הכל נמחק.</div></div>';
  setTimeout(() => addMessage('tishi', 'שיחה חדשה. במה אוכל לעזור?'), 300);
}

function clearAllData() {
  if (!confirm('למחוק את כל הנתונים של כל המשתמשים?')) return;
  getAllUsers().forEach(u => deleteUserData(u));
  localStorage.removeItem('tishi_model');
  closeSettings();
  addMessage('tishi', 'כל הנתונים נמחקו.');
}

function changeUser() {
  if (!confirm('להחליף משתמש?')) return;
  localStorage.removeItem('tishi_username');
  location.reload();
}

// ── CLEAR CHAT ──
function clearChat() {
  if (!confirm('למחוק את כל השיחה?')) return;
  deleteUserData(userName);
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-name">שיחה חדשה</div><div class="empty-hint">הכל נמחק. אפשר להתחיל מחדש.</div></div>';
  setTimeout(() => addMessage('tishi', 'שיחה חדשה. במה אוכל לעזור?'), 300);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
